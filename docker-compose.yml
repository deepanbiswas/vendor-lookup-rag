# Qdrant + Streamlit app. Ollama runs on the host (install via scripts/install-ollama-*).
# Compose file format: no top-level `version` key (obsolete in Docker Compose V2+).

services:
  qdrant:
    image: qdrant/qdrant:v1.16.0 # pinned (≥ 1.16 per project spec); bump intentionally when upgrading
    container_name: vendor_qdrant
    ports:
      - "6333:6333" # HTTP REST API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vendor-lookup-rag:local
    container_name: vendor_lookup_app
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Reach Qdrant on the Compose network (overrides localhost in .env)
      QDRANT_URL: http://qdrant:6333
      # Ollama on the host (Docker Desktop Mac/Windows provides host.docker.internal)
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  qdrant_data:
