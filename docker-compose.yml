# Qdrant for local development. Ollama runs on the host by default (see README).
# Compose file format: no top-level `version` key (obsolete in Docker Compose V2+).

services:
  # Vector database for semantic search
  qdrant:
    image: qdrant/qdrant:v1.16.0 # pinned (≥ 1.16 per project spec); bump intentionally when upgrading
    container_name: vendor_qdrant
    ports:
      - "6333:6333" # HTTP REST API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
