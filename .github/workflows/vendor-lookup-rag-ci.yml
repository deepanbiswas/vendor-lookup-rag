# Standalone repo: project root is the package (no monorepo working-directory).
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend/python
        run: pip install -e ".[dev]"

      - name: Unit tests
        working-directory: backend/python
        run: pytest

      - name: Generate OpenAPI JSON
        working-directory: backend/python
        run: vendor-api-openapi -o ../../docs/openapi.json

      - name: Verify OpenAPI matches committed spec
        run: git diff --exit-code docs/openapi.json

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: docs/openapi.json
          if-no-files-found: error

  build-csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: dotnet test (C#)
        run: dotnet test "backend/csharp/VendorLookupRag.sln" -c Release --logger "trx;LogFileName=csharp-results.trx" --results-directory "backend/csharp/TestResults"
        env:
          VENDOR_LOOKUP_CSHARP_PORT: "0"

  test-integration-qdrant:
    runs-on: ubuntu-latest
    env:
      QDRANT_URL: http://127.0.0.1:6333
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Only Qdrant is required for pytest integration (not api/app). Full compose uses
      # env_file: .env for api/app; that file is gitignored — starting only `qdrant` avoids needing it in CI.
      - name: Start Qdrant
        run: docker compose up -d qdrant

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:6333/readyz" >/dev/null; then
              echo "Qdrant is ready"
              exit 0
            fi
            echo "waiting... ($i)"
            sleep 2
          done
          echo "Qdrant did not become ready in time"
          exit 1

      - name: Install dependencies
        working-directory: backend/python
        run: pip install -e ".[dev]"

      - name: Integration tests (Qdrant only)
        working-directory: backend/python
        run: pytest -m "integration and not requires_ollama" --tb=short -v
